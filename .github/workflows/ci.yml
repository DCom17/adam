name: CI

on:
  push:
  pull_request:

jobs:
  test:
    # The product is Windows-only (PowerShell launchers, Windows event-loop
    # policy, taskkill), so test on the platform users actually run.
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest
