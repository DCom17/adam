# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json
PackageIdentifier: ZonteCampos.AdamLocal
PackageVersion: "1.0.0"   # TODO: match the signed release
InstallerLocale: en-US
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.0.0
InstallerType: inno
Scope: user
UpgradeBehavior: install
# The app has its own in-app updater; winget upgrade runs the installer, whose
